{% if messages %}
  <div class="mb-4" role="alert" aria-live="polite">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-start gap-2 mb-2"
           role="alert" style="border-radius:var(--radius-md);">
        <i class="bi bi-{% if message.tags == 'success' %}check-circle-fill{% elif message.tags == 'error' or message.tags == 'danger' %}exclamation-circle-fill{% elif message.tags == 'warning' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %} mt-1 flex-shrink-0"></i>
        <div class="flex-grow-1">{{ message }}</div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  </div>
  <script>
    // Auto-dismiss alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        document.querySelectorAll('.alert.show').forEach(function(el) {
          var bsAlert = bootstrap.Alert.getOrCreateInstance(el);
          if (bsAlert) bsAlert.close();
        });
      }, 5000);
    });
  </script>
{% endif %}
